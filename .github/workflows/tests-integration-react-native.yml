name: Integration Tests - React Native

on:
  push:
    branches:
      - main
    paths:
      - "examples/react-native-expo/**"
      - "packages/react-native/**"
      - "packages/core/**"
  pull_request:
    paths:
      - "examples/react-native-expo/**"
      - "packages/react-native/**"
      - "packages/core/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  test-react-native-expo:
    name: React Native Expo (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            os: macos-latest
          - platform: android
            os: ubuntu-latest
    steps:
      - name: Free disk space
        if: matrix.platform == 'android'
        run: |
          echo "=== Before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo apt-get clean
          docker rmi $(docker image ls -aq) 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-js

      - name: Enable KVM group perms
        if: matrix.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/react-native-expo

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK components
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/ndk/26.3.11579264
          key: android-sdk-components-${{ runner.os }}-cmake-3.22.1-ndk-26.3.11579264

      - name: Preinstall Android SDK components
        if: matrix.platform == 'android'
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "cmake;3.22.1" "ndk;26.3.11579264"

      - name: AVD cache
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64

      - name: Cache CocoaPods
        if: matrix.platform == 'ios'
        uses: actions/cache@v4
        with:
          path: |
            ./examples/react-native-expo/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache iOS DerivedData
        if: matrix.platform == 'ios'
        uses: actions/cache@v4
        with:
          path: ./examples/react-native-expo/ios/build
          key: ${{ runner.os }}-ios-build-${{ hashFiles('**/Podfile.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-ios-build-

      - name: Cache Detox framework
        if: matrix.platform == 'ios'
        uses: actions/cache@v4
        with:
          path: ~/Library/Detox
          key: ${{ runner.os }}-detox-framework-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-detox-framework-

      - name: Install Detox dependencies
        if: matrix.platform == 'ios'
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Build Detox framework cache
        if: matrix.platform == 'ios'
        run: |
          cd ./examples/react-native-expo
          pnpm exec detox clean-framework-cache
          pnpm exec detox build-framework-cache

      - name: List available Xcode versions
        if: matrix.platform == 'ios'
        run: |
          xcrun xcode-select --print-path
          xcodebuild -version

      - name: Install iOS simulator runtime
        if: matrix.platform == 'ios'
        run: |
          xcrun simctl list runtimes
          echo "iOS runtimes:"
          xcrun simctl list runtimes | grep iOS

      - name: Create and boot iOS simulator
        if: matrix.platform == 'ios'
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes | grep "iOS 26" | tail -1 | awk '{print $NF}')
          echo "Using runtime: $RUNTIME_ID"
          DEVICE_ID=$(xcrun simctl list | grep "iPhone 17 Pro" | head -1 | awk '{print $(NF-1)}' | tr -d '()')
          if [ -z "$DEVICE_ID" ]; then
            echo "Creating iPhone 17 Pro simulator..."
            DEVICE_ID=$(xcrun simctl create "iPhone 17 Pro" "com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro" "$RUNTIME_ID" | head -1)
          else
            echo "iPhone 17 Pro simulator already exists: $DEVICE_ID"
          fi
          echo "Booting simulator..."
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 10
          xcrun simctl list devices | grep "iPhone 17 Pro"

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/react-native-expo
        env:
          EXPO_PUBLIC_QUILTT_CLIENT_ID: test-client-id
          EXPO_PUBLIC_QUILTT_AUTH_TOKEN: test-auth-token
          EXPO_PUBLIC_CONNECTOR_ID: 1h6bz4vo9z
          EXPO_PUBLIC_INSTITUTION_SEARCH_TERM: test

      - name: Build for testing (iOS)
        if: matrix.platform == 'ios'
        run: pnpm run test:ios:build
        working-directory: ./examples/react-native-expo
        env:
          EXPO_PUBLIC_QUILTT_CLIENT_ID: test-client-id
          EXPO_PUBLIC_QUILTT_AUTH_TOKEN: test-auth-token
          EXPO_PUBLIC_CONNECTOR_ID: 1h6bz4vo9z
          EXPO_PUBLIC_INSTITUTION_SEARCH_TERM: test

      - name: Build for testing (Android)
        if: matrix.platform == 'android'
        run: pnpm run test:android:build
        working-directory: ./examples/react-native-expo
        env:
          EXPO_PUBLIC_QUILTT_CLIENT_ID: test-client-id
          EXPO_PUBLIC_QUILTT_AUTH_TOKEN: test-auth-token
          EXPO_PUBLIC_CONNECTOR_ID: 1h6bz4vo9z
          EXPO_PUBLIC_INSTITUTION_SEARCH_TERM: test

      - name: Verify APK files exist
        if: matrix.platform == 'android'
        run: |
          echo "Checking for APK files..."
          ls -la android/app/build/outputs/apk/debug/ || echo "Debug APK directory not found"
          ls -la android/app/build/outputs/apk/androidTest/debug/ || echo "Test APK directory not found"
        working-directory: ./examples/react-native-expo

      - name: Create AVD and generate snapshot for caching
        if: matrix.platform == 'android' && steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          avd-name: Pixel_API_34_AOSP
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo 'Generated AVD snapshot for caching.'

      - name: Run E2E tests (iOS)
        if: matrix.platform == 'ios'
        run: pnpm run test
        working-directory: ./examples/react-native-expo
        env:
          PLATFORM: ios

      - name: Run E2E tests (Android)
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          avd-name: Pixel_API_34_AOSP
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: ./examples/react-native-expo
          script: |
            adb devices
            pnpm run test
        env:
          PLATFORM: android

      - if: failure() && matrix.platform == 'ios'
        name: Upload iOS test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios_test_artifacts_${{ github.sha }}
          path: |
            ./examples/react-native-expo/artifacts
            ./examples/react-native-expo/ios/build/logs
          retention-days: 3
          if-no-files-found: warn
          compression-level: 6

      - if: failure() && matrix.platform == 'android'
        name: Upload Android test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_test_artifacts_${{ github.sha }}
          path: |
            ./examples/react-native-expo/artifacts
            ./examples/react-native-expo/android/app/build/outputs/androidTest-results
          retention-days: 3
          if-no-files-found: warn
          compression-level: 6
