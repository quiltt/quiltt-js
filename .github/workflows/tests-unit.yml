name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      android: ${{ steps.filter.outputs.android }}
      flutter: ${{ steps.filter.outputs.flutter }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'packages/android/**'
            flutter:
              - 'packages/flutter/**'
            ios:
              - 'packages/ios/**'

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run unit tests with coverage
        run: pnpm run test:unit

      - name: Upload coverage to Qlty
        if: always()
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/lcov.info

  test-android-unit:
    needs: changes
    name: Android Unit Tests
    runs-on: ubuntu-latest
    if: needs.changes.outputs.android == 'true'
    defaults:
      run:
        working-directory: packages/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew connector:test

  test-flutter-unit:
    needs: changes
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    if: needs.changes.outputs.flutter == 'true'
    defaults:
      run:
        working-directory: packages/flutter

    steps:
      - uses: actions/checkout@v4

      - uses: flutter-actions/setup-flutter@v4
        with:
          version: '3.32.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: cd example && flutter pub get && flutter test

  test-ios-unit:
    needs: changes
    name: iOS Unit Tests
    runs-on: macos-14
    if: needs.changes.outputs.ios == 'true'
    defaults:
      run:
        working-directory: packages/ios

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Run tests
        run: swift test
