name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      android: ${{ steps.filter.outputs.android }}
      flutter: ${{ steps.filter.outputs.flutter }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'packages/android/**'
            flutter:
              - 'packages/flutter/**'
            ios:
              - 'packages/ios/**'

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-js

      - name: Run unit tests with coverage
        run: pnpm run test:unit

      - name: Upload coverage to Qlty
        if: always()
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/lcov.info
          format: lcov
          incomplete: true

  test-android-unit:
    needs: changes
    name: Android Unit Tests
    runs-on: ubuntu-latest
    if: needs.changes.outputs.android == 'true'
    defaults:
      run:
        working-directory: packages/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests with coverage
        run: ./gradlew connector:testDebugUnitTest

      - name: Upload coverage to Qlty
        if: always()
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: packages/android/connector/build/reports/coverage/test/debug/report.xml
          format: jacoco
          incomplete: true

  test-flutter-unit:
    needs: changes
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    if: needs.changes.outputs.flutter == 'true'
    defaults:
      run:
        working-directory: packages/flutter

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-flutter

      - name: Install dependencies
        run: flutter pub get

      - name: Run library unit tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Qlty
        if: always()
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: packages/flutter/coverage/lcov.info
          format: lcov
          incomplete: true

      - name: Test example app
        run: cd example && flutter pub get && flutter test

  test-ios-unit:
    needs: changes
    name: iOS Unit Tests
    runs-on: macos-14
    if: needs.changes.outputs.ios == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Run tests with coverage
        working-directory: .
        run: swift test --enable-code-coverage

      - name: Generate lcov coverage report
        working-directory: .
        run: |
          BINARY=$(find .build -name "*PackageTests" -not -path "*checkouts*" -not -name "*.dSYM" | head -1)
          PROFDATA=$(find .build/debug/codecoverage -name "*.profdata" 2>/dev/null | head -1)
          if [ -n "$BINARY" ] && [ -n "$PROFDATA" ]; then
            mkdir -p packages/ios/coverage
            xcrun llvm-cov export "$BINARY" \
              -instr-profile "$PROFDATA" \
              -format lcov \
              --ignore-filename-regex='.*\.build.*|.*Tests.*' \
              > packages/ios/coverage/lcov.info
            echo "Coverage report generated at packages/ios/coverage/lcov.info"
          else
            echo "Warning: could not find binary ($BINARY) or profdata ($PROFDATA)"
          fi

      - name: Upload coverage to Qlty
        if: always()
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: packages/ios/coverage/lcov.info
          format: lcov
          incomplete: true

  coverage-complete:
    name: Coverage Complete
    runs-on: ubuntu-latest
    needs: [test, test-android-unit, test-flutter-unit, test-ios-unit]
    if: always()
    steps:
      - name: Signal coverage complete to Qlty
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          command: complete
