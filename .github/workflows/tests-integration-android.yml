name: Integration Tests - Android SDK

on:
  push:
    branches:
      - main
    paths:
      - "packages/android/**"
  pull_request:
    paths:
      - "packages/android/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  test-android:
    name: Android Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Cache Android SDK components
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/ndk/26.3.11579264
          key: android-sdk-components-${{ runner.os }}-cmake-3.22.1-ndk-26.3.11579264

      - name: Preinstall Android SDK components
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "cmake;3.22.1" "ndk;26.3.11579264"

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build app and androidTest APKs
        run: ./gradlew app:assembleDebug app:assembleAndroidTest

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: packages/android
          script: ./gradlew app:connectedDebugAndroidTest

      - if: failure()
        name: Upload Android test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_integration_test_artifacts_${{ github.sha }}
          path: |
            ./packages/android/app/build/reports/androidTests
            ./packages/android/app/build/outputs/androidTest-results
          retention-days: 3
          if-no-files-found: warn
          compression-level: 6
