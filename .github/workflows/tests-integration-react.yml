name: Integration Tests - React

on:
  push:
    branches:
      - main
    paths:
      - 'examples/react-nextjs/**'
      - 'packages/react/**'
      - 'packages/core/**'
  pull_request:
    paths:
      - 'examples/react-nextjs/**'
      - 'packages/react/**'
      - 'packages/core/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  test-react-nextjs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/react-nextjs

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm run playwright:install
        working-directory: ./examples/react-nextjs

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/react-nextjs

      - name: Run E2E tests
        run: pnpm run test
        working-directory: ./examples/react-nextjs

      - if: failure()
        name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs_test_artifacts_${{ github.sha }}
          path: ./examples/react-nextjs/playwright-report
