name: Flutter CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/flutter/**'
  pull_request:
    paths:
      - 'packages/flutter/**'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/flutter

jobs:
  build:
    name: Flutter CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: flutter-actions/setup-flutter@v4
        with:
          version: '3.32.0'
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle install
          flutter pub get

      - name: Analyze
        run: flutter analyze lib

      - name: Check publish readiness
        run: flutter pub publish --dry-run
