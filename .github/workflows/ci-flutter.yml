name: Flutter CI

on:
  push:
    branches:
      - main
    paths:
      - "packages/flutter/**"
  pull_request:
    paths:
      - "packages/flutter/**"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/flutter

jobs:
  build:
    name: Flutter CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-flutter

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib

      - name: Check publish readiness
        run: flutter pub publish --dry-run
