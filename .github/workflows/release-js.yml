name: JS Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    # prevent this action from running on forks
    if: github.repository == 'quiltt/quiltt-sdks'

    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read
      statuses: write
      checks: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-js
        with:
          build-packages: "false"

      - name: Create .npmrc in home folder
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" >> $HOME/.npmrc
          echo "strict-peer-dependencies=false" >> $HOME/.npmrc
          echo "git-checks=false" >> $HOME/.npmrc

      - name: Authenticate with npm registry
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release pull request or release to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run publish
          title: Version and Release Packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.QUILTTY_RELEASE_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
