name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      react-native: ${{ steps.filter.outputs.react-native }}
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nextjs:
              - 'examples/react-nextjs/**'
              - 'packages/react/**'
            react-native:
              - 'examples/react-native-expo/**'
              - 'packages/react-native/**'
            core:
              - 'packages/core/**'

  test-ios:
    needs: changes
    runs-on: macos-latest
    timeout-minutes: 120
    if: needs.changes.outputs.react-native == 'true' || needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/react-native-expo

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ./examples/react-native-expo/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache iOS DerivedData
        uses: actions/cache@v4
        with:
          path: ./examples/react-native-expo/ios/build
          key: ${{ runner.os }}-ios-build-${{ hashFiles('**/Podfile.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-ios-build-

      - name: Cache Detox framework
        uses: actions/cache@v4
        with:
          path: ~/Library/Detox
          key: ${{ runner.os }}-detox-framework-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-detox-framework-

      - name: Install Detox dependencies
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Build Detox framework cache
        run: |
          cd ./examples/react-native-expo
          pnpm exec detox clean-framework-cache
          pnpm exec detox build-framework-cache

      - name: List available Xcode versions
        run: |
          xcrun xcode-select --print-path
          xcodebuild -version

      - name: Install iOS simulator runtime
        run: |
          xcrun simctl list runtimes
          echo "iOS runtimes:"
          xcrun simctl list runtimes | grep iOS

      - name: Create and boot iOS simulator
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes | grep "iOS 26" | tail -1 | awk '{print $NF}')
          echo "Using runtime: $RUNTIME_ID"
          DEVICE_ID=$(xcrun simctl list | grep "iPhone 17 Pro" | head -1 | awk '{print $(NF-1)}' | tr -d '()')
          if [ -z "$DEVICE_ID" ]; then
            echo "Creating iPhone 17 Pro simulator..."
            DEVICE_ID=$(xcrun simctl create "iPhone 17 Pro" "com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro" "$RUNTIME_ID" | head -1)
          else
            echo "iPhone 17 Pro simulator already exists: $DEVICE_ID"
          fi
          echo "Booting simulator..."
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 10
          xcrun simctl list devices | grep "iPhone 17 Pro"

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/react-native-expo
        env:
          EXPO_PUBLIC_QUILTT_CLIENT_ID: test-client-id
          EXPO_PUBLIC_QUILTT_AUTH_TOKEN: test-auth-token
          EXPO_PUBLIC_CONNECTOR_ID: test-connector-id
          EXPO_PUBLIC_INSTITUTION_SEARCH_TERM: test

      - name: Build for testing
        run: pnpm run test:ios:build
        working-directory: ./examples/react-native-expo
        env:
          EXPO_PUBLIC_QUILTT_CLIENT_ID: test-client-id
          EXPO_PUBLIC_QUILTT_AUTH_TOKEN: test-auth-token
          EXPO_PUBLIC_CONNECTOR_ID: test-connector-id
          EXPO_PUBLIC_INSTITUTION_SEARCH_TERM: test

      - name: Run E2E tests
        run: pnpm run test
        working-directory: ./examples/react-native-expo
        env:
          PLATFORM: ios

      - if: failure()
        name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios_test_artifacts_${{ github.sha }}
          path: |
            ./examples/react-native-expo/artifacts
            ./examples/react-native-expo/ios/build/logs
          retention-days: 3
          if-no-files-found: warn
          compression-level: 6

  test-android:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: needs.changes.outputs.react-native == 'true' || needs.changes.outputs.core == 'true'
    steps:
      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h
          # Remove large pre-installed software
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          # Clean apt cache
          sudo apt-get clean
          # Remove docker images
          docker rmi $(docker image ls -aq) 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Increase file watcher limit
        run: |
          echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/react-native-expo

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: |
            ./examples/react-native-expo/android/.gradle
            ./examples/react-native-expo/android/app/build
            ./examples/react-native-expo/android/build
          key: ${{ runner.os }}-android-build-${{ hashFiles('**/build.gradle', '**/gradle-wrapper.properties', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-34;google_apis;x86_64" "emulator" "platform-tools" "platforms;android-34"

      - name: Create Android emulator
        run: |
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            -n Pixel_API_34_AOSP \
            -k "system-images;android-34;google_apis;x86_64" \
            -d "pixel" \
            --force

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/react-native-expo

      - name: Build for testing
        run: |
          cd android
          ./gradlew assembleDebug assembleAndroidTest -DtestBuildType=debug --no-daemon --max-workers=2 -Dorg.gradle.parallel=true
        working-directory: ./examples/react-native-expo
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Run E2E tests
        run: |
          # Start emulator in background and capture PID
          nohup $ANDROID_HOME/emulator/emulator -avd Pixel_API_34_AOSP -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048 >/tmp/emulator.log 2>&1 &
          EMU_PID=$!
          echo "Started emulator (PID=$EMU_PID), waiting for adb to report boot completion"

          # Wait for adb device to be available
          ADB_RETRY=0
          until $ANDROID_HOME/platform-tools/adb devices | grep -m 1 emulator || [ $ADB_RETRY -ge 12 ]; do
            ADB_RETRY=$((ADB_RETRY+1))
            echo "Waiting for emulator to appear in adb devices... (${ADB_RETRY})"
            sleep 5
          done

          # Wait for the Android system to finish booting (sys.boot_completed == 1)
          BOOT_TIMEOUT=180
          BOOT_WAIT=0
          until $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | grep -m 1 '1'; do
            if [ $BOOT_WAIT -ge $BOOT_TIMEOUT ]; then
              echo "Emulator boot timed out after ${BOOT_TIMEOUT}s"
              # Dump emulator logs for debugging
              tail -n 200 /tmp/emulator.log || true
              kill $EMU_PID || true
              exit 1
            fi
            echo "Waiting for Android emulator to boot... (${BOOT_WAIT}s)"
            sleep 5
            BOOT_WAIT=$((BOOT_WAIT + 5))
          done

          echo "Emulator booted successfully"
          # Disable animations for faster tests
          $ANDROID_HOME/platform-tools/adb shell settings put global window_animation_scale 0 || true
          $ANDROID_HOME/platform-tools/adb shell settings put global transition_animation_scale 0 || true
          $ANDROID_HOME/platform-tools/adb shell settings put global animator_duration_scale 0 || true
          # Unlock screen
          $ANDROID_HOME/platform-tools/adb shell input keyevent 82 || true

          # Start tests in background so emulator startup doesn't block overall step
          (cd ./examples/react-native-expo && pnpm run test) &
          TEST_PID=$!

          # Monitor test process and exit with its status once it completes
          wait $TEST_PID
          TEST_EXIT=$?
          echo "E2E tests exited with code: $TEST_EXIT"

          # Teardown emulator
          kill $EMU_PID || true
          # Forward test exit code for workflow status
          exit $TEST_EXIT
        env:
          PLATFORM: android

      - if: failure()
        name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_test_artifacts_${{ github.sha }}
          path: |
            ./examples/react-native-expo/artifacts
            ./examples/react-native-expo/android/app/build/outputs/androidTest-results
          retention-days: 3
          if-no-files-found: warn
          compression-level: 6

  test-nextjs:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.changes.outputs.nextjs == 'true' || needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/react-nextjs

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/react-nextjs

      - name: Run E2E tests
        run: pnpm run test:e2e
        working-directory: ./examples/react-nextjs

      - if: failure()
        name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs_test_artifacts_${{ github.sha }}
          path: ./examples/react-nextjs/playwright-report
