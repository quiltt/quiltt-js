name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      react-native: ${{ steps.filter.outputs.react-native }}
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nextjs:
              - 'examples/react-nextjs/**'
              - 'packages/react/**'
            react-native:
              - 'examples/react-native-expo/**'
              - 'packages/react-native/**'
            core:
              - 'packages/core/**'

  test-ios:
    needs: changes
    runs-on: macos-latest
    if: needs.changes.outputs.react-native == 'true' || needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/react-native-expo

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ./examples/react-native-expo/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache iOS DerivedData
        uses: actions/cache@v4
        with:
          path: ./examples/react-native-expo/ios/build
          key: ${{ runner.os }}-ios-build-${{ hashFiles('**/Podfile.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-ios-build-

      - name: Cache Detox framework
        uses: actions/cache@v4
        with:
          path: ~/Library/Detox
          key: ${{ runner.os }}-detox-framework-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-detox-framework-

      - name: Install Detox dependencies
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Build Detox framework cache
        run: |
          cd ./examples/react-native-expo
          pnpm exec detox clean-framework-cache
          pnpm exec detox build-framework-cache

      - name: List available Xcode versions
        run: |
          xcrun xcode-select --print-path
          xcodebuild -version

      - name: Install iOS 26.2 simulator runtime
        run: |
          xcrun simctl list runtimes
          echo "iOS runtimes:"
          xcrun simctl list runtimes | grep iOS

      - name: Create and boot iPhone 17 Pro simulator
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes | grep "iOS 26" | tail -1 | awk '{print $NF}')
          echo "Using runtime: $RUNTIME_ID"
          DEVICE_ID=$(xcrun simctl list | grep "iPhone 17 Pro" | head -1 | awk '{print $(NF-1)}' | tr -d '()')
          if [ -z "$DEVICE_ID" ]; then
            echo "Creating iPhone 17 Pro simulator..."
            DEVICE_ID=$(xcrun simctl create "iPhone 17 Pro" "com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro" "$RUNTIME_ID" | head -1)
          else
            echo "iPhone 17 Pro simulator already exists: $DEVICE_ID"
          fi
          echo "Booting simulator..."
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 10
          xcrun simctl list devices | grep "iPhone 17 Pro"

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/react-native-expo
        env:
          EXPO_PUBLIC_QUILTT_CLIENT_ID: test-client-id
          EXPO_PUBLIC_QUILTT_AUTH_TOKEN: test-auth-token
          EXPO_PUBLIC_CONNECTOR_ID: test-connector-id
          EXPO_PUBLIC_INSTITUTION_SEARCH_TERM: test

      - name: Build for testing
        run: pnpm run test:ios:build
        working-directory: ./examples/react-native-expo
        env:
          EXPO_PUBLIC_QUILTT_CLIENT_ID: test-client-id
          EXPO_PUBLIC_QUILTT_AUTH_TOKEN: test-auth-token
          EXPO_PUBLIC_CONNECTOR_ID: test-connector-id
          EXPO_PUBLIC_INSTITUTION_SEARCH_TERM: test

      - name: Run tests
        run: pnpm run test
        working-directory: ./examples/react-native-expo
        env:
          PLATFORM: ios

      - if: failure()
        name: Upload iOS Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios_test_artifacts_${{ github.sha }}
          path: |
            ./examples/react-native-expo/artifacts
            ./examples/react-native-expo/ios/build/logs
          retention-days: 3
          if-no-files-found: warn
          compression-level: 6

  test-android:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.react-native == 'true' || needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/react-native-expo

      - name: Create Android emulator
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-34;default;x86_64"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            -n Pixel_API_34_AOSP \
            -k "system-images;android-34;default;x86_64" \
            -d "pixel"
          $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager list avd

      - name: Start Android emulator
        run: |
          nohup $ANDROID_HOME/emulator/emulator -avd Pixel_API_34_AOSP -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim &
          $ANDROID_HOME/platform-tools/adb wait-for-device
          # Wait for boot to complete
          until $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed | grep -m 1 '1'; do
            echo "Waiting for Android emulator to boot..."
            sleep 5
          done
          echo "Emulator booted successfully"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: |
            ./examples/react-native-expo/android/app/build
            ./examples/react-native-expo/android/build
          key: ${{ runner.os }}-android-build-${{ hashFiles('**/build.gradle', '**/gradle-wrapper.properties', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Cache Android SDK system images
        uses: actions/cache@v4
        with:
          path: |
            $ANDROID_HOME/system-images
            $ANDROID_HOME/platforms
            $ANDROID_HOME/build-tools
          key: ${{ runner.os }}-android-sdk-34
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Setup Java (Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK (Android)
        uses: android-actions/setup-android@v3

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/react-native-expo

      - name: Build for testing (Android)
        run: pnpm run build
        working-directory: ./examples/react-native-expo

      - name: Run tests
        run: pnpm run test
        working-directory: ./examples/react-native-expo
        env:
          PLATFORM: android

      - if: failure()
        name: Upload Android Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_test_artifacts_${{ github.sha }}
          path: |
            ./examples/react-native-expo/artifacts
            ./examples/react-native-expo/android/app/build/outputs/androidTest-results
          retention-days: 3
          if-no-files-found: warn
          compression-level: 6
